version: 0.2

phases:
  install:
    commands:
      - echo Installing Docker...
      - nohup /usr/local/bin/dockerd-entrypoint.sh &   # Start Docker daemon
      - timeout 15 sh -c "until docker info; do echo waiting for docker; sleep 2; done"

  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws --version

  build:
    commands:
      - echo Build started on `date`
      - docker build -t my-app .

  post_build:
    commands:
      - echo Build completed
