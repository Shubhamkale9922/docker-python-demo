version: 0.2

phases:
  install:
    commands:
      - echo Starting Docker...
      - nohup /usr/local/bin/dockerd-entrypoint.sh &
      - timeout 15 sh -c "until docker info; do echo waiting for docker; sleep 2; done"

  build:
    commands:
      - echo Build started
      - docker build -t my-app .

  post_build:
    commands:
      - echo Build completed
